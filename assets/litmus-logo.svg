<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Litmus">
  <defs>
    <radialGradient id="litmus-bg" cx="28%" cy="22%" r="78%">
      <stop offset="0%" stop-color="#13251c"/>
      <stop offset="50%" stop-color="#0a0f0c"/>
      <stop offset="100%" stop-color="#040605"/>
    </radialGradient>
    <linearGradient id="litmus-strip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="38%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="litmus-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.42"/>
      <stop offset="35%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="litmus-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded tile -->
  <rect width="256" height="256" rx="58" fill="url(#litmus-bg)"/>

  <!-- Thin verification orbit -->
  <ellipse cx="128" cy="132" rx="98" ry="94" fill="none" stroke="#14532d" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- Drop = "test" moment -->
  <path
    d="M128 40c-9 14-22 28-22 46 0 18 10 30 22 30s22-12 22-30c0-18-13-32-22-46z"
    fill="#064e3b"
    fill-opacity="0.85"
    stroke="#34d399"
    stroke-opacity="0.5"
    stroke-width="1.25"
  />

  <!-- Litmus strip (capsule) -->
  <g filter="url(#litmus-glow)">
    <rect x="104" y="72" width="48" height="148" rx="24" fill="#020617" stroke="#1e293b" stroke-width="2"/>
    <rect x="110" y="80" width="36" height="132" rx="18" fill="url(#litmus-strip)"/>
    <rect x="116" y="86" width="12" height="120" rx="6" fill="url(#litmus-shine)"/>
  </g>

  <!-- Ground reflection -->
  <ellipse cx="128" cy="218" rx="36" ry="5" fill="#34d399" fill-opacity="0.07"/>
</svg>
